# Mixvoip CyberAssistance — Nginx Reverse Proxy Configuration
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Or include it in your existing server block.
#
# This proxies all /cyber/ requests to the Node.js application.
# The Node.js app serves the static SPA and handles client-side routing.

# Upstream definition — adjust port to match your .env or systemd config
upstream cyber_app {
    server 127.0.0.1:3020;  # Must match PORT in .env / systemd service
}

# Add this inside your existing server { } block for mixvoip.com:
location /cyber/ {
    proxy_pass http://cyber_app/cyber/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Cache static assets aggressively
    location ~* /cyber/assets/ {
        proxy_pass http://cyber_app;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}

